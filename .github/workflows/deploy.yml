# Deploy to Vercel on every push to main (after CI passes).
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN     — from vercel.com/account/tokens
#   VERCEL_ORG_ID    — from .vercel/project.json after running `vercel link`
#   VERCEL_PROJECT_ID — from .vercel/project.json after running `vercel link`

name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: [] # add "ci" here once you want deploy to depend on CI passing

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
